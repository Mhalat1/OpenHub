services:

    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
 
    App\Service\AuthenticationServiceInterface: '@App\Service\AuthenticationService'

    App\Security\LoginSuccessHandler:
        public: true

    App\Security\LoginFailureHandler:
        public: true


    App\EventListener\RequestMetricsListener:
        tags:
            - { name: kernel.event_listener, event: kernel.request }
