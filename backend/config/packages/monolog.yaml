# config/packages/monolog.yaml
# Configuration Monolog pour open-hub - compatible ELK Stack

when@prod:
  monolog:
    handlers:

      # Handler principal - capture les erreurs
      main:
        type: fingers_crossed
        action_level: error
        handler: json_file
        excluded_http_codes: [404]
        buffer_size: 50

      # Écriture en JSON pour faciliter le parsing par Filebeat/ELK
      json_file:
        type: stream
        path: "%kernel.logs_dir%/%kernel.environment%.log"
        level: debug
        formatter: monolog.formatter.json

      # Logs de requêtes HTTP séparés
      http_requests:
        type: stream
        path: "%kernel.logs_dir%/http.log"
        level: info
        formatter: monolog.formatter.json
        channels: ["request"]

when@dev:
  monolog:
    handlers:
      main:
        type: stream
        path: "%kernel.logs_dir%/%kernel.environment%.log"
        level: debug
        formatter: monolog.formatter.json

      console:
        type: console
        process_psr_3_messages: false
        channels: ["!event", "!doctrine", "!console"]