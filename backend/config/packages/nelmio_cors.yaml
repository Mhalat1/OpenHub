nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin: []
        allow_credentials: false
        allow_headers: []
        allow_methods: []
        max_age: 0

    paths:
        '^/':
            allow_origin: 
                - 'https://openhub-front.onrender.com'
                - 'http://127.0.0.1:5173'
                - 'http://localhost:5173'
            allow_credentials: true
            allow_headers: 
                - 'Content-Type'
                - 'Authorization'
                - 'X-Requested-With'
                - 'Accept'
            allow_methods: 
                - 'GET'
                - 'POST'
                - 'PUT'
                - 'PATCH'
                - 'DELETE'
                - 'OPTIONS'
            max_age: 3600