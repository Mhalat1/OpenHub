nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin: ['https://openhub-front.onrender.com', 'http://127.0.0.1:5173', 'http://localhost:5173']
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization', 'X-Requested-With', 'Accept']
        expose_headers: ['Link']
        max_age: 3600
        allow_credentials: true
    paths:
        '^/api/': ~
        '^/admin': ~
        '^/': ~