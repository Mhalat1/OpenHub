services:
  # Backend Symfony
  - type: web
    name: symfony-backend
    env: php
    plan: free
    buildCommand: |
      cd backend
      chmod +x build.sh
      ./build.sh
    startCommand: |
      cd backend && php -S 0.0.0.0:$PORT -t public
    envVars:
      - key: APP_ENV
        value: prod  # ⬅️ CORRIGÉ: "prod" au lieu de "production"
      - key: APP_SECRET
        generateValue: true
      - key: JWT_PASSPHRASE
        generateValue: true
      - key: DATABASE_URL
        fromService:
          type: mysql  # ⬅️ CORRIGÉ: "mysql" au lieu de "postgresql"
          name: aiven-mysql
          property: connectionString
    healthCheckPath: /health  # ⬅️ CORRIGÉ: utilise ta route existante

  # Frontend React
  - type: web
    name: react-frontend
    env: static
    buildCommand: |
      cd frontend
      npm install
      npm run build
    staticPublishPath: ./frontend/build
    envVars:
      - key: VITE_API_URL  # ⬅️ CORRIGÉ: "VITE_" pour Vite
        fromService:
          type: web
          name: symfony-backend
          property: host
        prefix: https://

# Database Aiven MySQL
databases:
  - name: aiven-mysql
    plan: free
    databaseName: myapp
    user: myapp_user