# config/packages/nelmio_cors.yaml
nelmio_cors:
    defaults:
        allow_credentials: true
        origin_regex: true
        allow_origin: 
            - '%env(CORS_ALLOW_ORIGIN)%'
            - 'http://localhost:5173'
            - 'http://127.0.0.1:5173'
            - 'https://openhub-front.onrender.com'
        allow_headers: 
            - 'Content-Type'
            - 'Authorization'
            - 'X-Requested-With'
            - 'Accept'
        allow_methods: ['GET', 'POST', 'PUT', 'DELETE', 'OPTIONS']
        max_age: 3600
        hosts: []
    paths:
        '^/api/':
            allow_origin: 
                - '%env(CORS_ALLOW_ORIGIN)%'
                - 'http://localhost:5173'
                - 'http://127.0.0.1:5173'
                - 'https://openhub-front.onrender.com'
            allow_headers: 
                - 'Content-Type'
                - 'Authorization'
                - 'X-Requested-With'
                - 'Accept'
            allow_methods: ['GET', 'POST', 'PUT', 'DELETE', 'OPTIONS']
            allow_credentials: true
