nelmio_cors:
    defaults:
        origin_regex: true
        allow_headers: ['Content-Type', 'Authorization', 'X-Requested-With', 'Accept']
        allow_methods: ['GET', 'POST', 'PUT', 'DELETE', 'OPTIONS']
        max_age: 3600
        hosts: []

    paths:
        '^/api/':
            allow_origin: 
                - 'https://openhub-front.onrender.com'
                - 'http://localhost:5173'
                - 'http://127.0.0.1:5173'
            allow_credentials: true
