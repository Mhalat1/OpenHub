services:
  # Backend Symfony
  - type: web
    name: symfony-backend
    env: php
    plan: free
    buildCommand: |
      cd backend
      chmod +x render-start.sh
      ./render-start.sh
    startCommand: |
      cd backend && php -S 0.0.0.0:$PORT public/index.php
    envVars:
      - key: APP_ENV
        value: prod
      - key: APP_SECRET
        generateValue: true
      - key: JWT_PASSPHRASE
        generateValue: true
      - key: DATABASE_URL
        fromService:
          type: mysql
          name: aiven-mysql
          property: connectionString
    healthCheckPath: /health

  # Frontend React
  - type: web
    name: react-frontend
    env: static
    buildCommand: |
      cd frontend
      npm install
      npm run build
    staticPublishPath: ./frontend/build
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: symfony-backend
          property: host
        prefix: https://

databases:
  - name: aiven-mysql
    plan: free
    databaseName: myapp
    user: myapp_user