filebeat.inputs:

  # ── Logs Symfony (erreurs PHP, exceptions, etc.) ──
  - type: log
    enabled: true
    paths:
      - /var/log/symfony/*.log
    fields:
      app: symfony
      env: production
    fields_under_root: true
    # Regrouper les stack traces multi-lignes en un seul event
    multiline.pattern: '^\['
    multiline.negate: true
    multiline.match: after

  # ── Logs Nginx (HTTP 200, 404, 500...) ──
  - type: log
    enabled: true
    paths:
      - /var/log/nginx/access.log
    fields:
      app: nginx
      log_type: access
    fields_under_root: true

  - type: log
    enabled: true
    paths:
      - /var/log/nginx/error.log
    fields:
      app: nginx
      log_type: error
    fields_under_root: true

# ── Envoyer vers Elasticsearch ──
output.elasticsearch:
  hosts: ["elasticsearch:9200"]
  indices:
    - index: "symfony-logs-%{+yyyy.MM.dd}"
      when.equals:
        app: "symfony"
    - index: "nginx-access-%{+yyyy.MM.dd}"
      when.contains:
        log_type: "access"
    - index: "nginx-error-%{+yyyy.MM.dd}"
      when.contains:
        log_type: "error"

# ── Logging Filebeat lui-même ──
logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7