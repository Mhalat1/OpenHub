services:
  # Backend Symfony
  - type: web
    name: symfony-backend
    env: php
    plan: free
    buildCommand: |
      cd backend
      chmod +x build.sh
      ./build.sh
    startCommand: |
      cd backend
      symfony server:start --port=$PORT --no-tls
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_SECRET
        generateValue: true
      - key: JWT_PASSPHRASE
        generateValue: true
      - key: DATABASE_URL
        fromService:
          type: postgresql
          name: aiven-mysql
          property: connectionString
    healthCheckPath: /api

  # Frontend React
  - type: web
    name: react-frontend
    env: static
    buildCommand: |
      cd frontend
      npm install
      npm run build
    staticPublishPath: ./frontend/build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: symfony-backend
          property: host
        prefix: https://

# Database Aiven MySQL
databases:
  - name: aiven-mysql
    plan: free
    databaseName: myapp
    user: myapp_user