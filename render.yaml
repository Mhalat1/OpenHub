  services:
  - type: web
    name: openhub-api
    env: php
    buildCommand: composer install --no-interaction --no-dev --optimize-autoloader
    startCommand: |
      php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration &&
      php -S 0.0.0.0:$PORT -t public
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false  # à renseigner manuellement : mysql://user:pass@aiven-host:port/openhub?serverVersion=8.0.32&charset=utf8mb4
      - key: JWT_PASSPHRASE
        sync: false  # à renseigner manuellement dans le dashboard Render
      - key: JWT_PRIVATE_KEY
        value: "%kernel.project_dir%/config/jwt/private.pem"
      - key: JWT_PUBLIC_KEY
        value: "%kernel.project_dir%/config/jwt/public.pem"
      - key: TRUSTED_PROXIES
        value: REMOTE_ADDR