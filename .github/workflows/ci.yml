name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Jest
        run: npm run test:jest

      - name: Build
        run: npm run build

  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: openhub_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_mysql
          coverage: xdebug

      - name: Create .env for CI
        run: |
          echo "APP_ENV=test" > .env
          echo "APP_SECRET=ci_secret_for_tests" >> .env
          echo "DATABASE_URL=mysql://root:root@127.0.0.1:3306/openhub_test" >> .env

      - name: Install Composer dependencies
        run: |
          rm -rf vendor/
          composer install --prefer-dist --no-progress --no-interaction --no-scripts

      - name: Create database schema
        run: php bin/console doctrine:schema:create --env=test

      - name: Phpunit
        run: php vendor/bin/phpunit tests --log-junit phpunit-report.xml || true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-report
          path: backend/phpunit-report.xml