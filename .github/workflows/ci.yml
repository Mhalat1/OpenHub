name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend 
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json  # 👈 AJOUTE CECI
          
      - name: Install dependencies
        run: npm ci  # Maintenant ça marchera !
        
      - name: Lint
        run: npm run lint
        
      - name: Tests
        run: npm test
        
      - name: Build
        run: npm run build