name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Jest
        run: npm run test:jest

      - name: Build
        run: npm run build

  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: openhub_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_mysql
          coverage: xdebug

      - name: Create .env.test.local for CI
        run: |
          cat > .env.test.local << 'DOTENV'
          DATABASE_URL=mysql://root:root@127.0.0.1:3306/openhub_test?serverVersion=8.0.32&charset=utf8mb4
          JWT_PASSPHRASE=ci_jwt_passphrase
          DOTENV

      - name: Install Composer dependencies
        run: |
          rm -rf vendor/
          composer install --prefer-dist --no-progress --no-interaction --no-scripts

      - name: Generate JWT keys
        run: |
          mkdir -p config/jwt
          openssl genrsa -passout pass:ci_jwt_passphrase -out config/jwt/private.pem 2048
          openssl rsa -in config/jwt/private.pem -passin pass:ci_jwt_passphrase -pubout -out config/jwt/public.pem

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -u root -proot --silent && break
            echo "Attente MySQL... ($i/30)"
            sleep 2
          done

      - name: Create database schema
        run: php bin/console doctrine:schema:create --env=test

      - name: Phpunit
        run: php vendor/bin/phpunit tests