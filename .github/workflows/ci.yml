name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Jest
        run: npm run test:jest

      - name: Build
        run: npm run build

  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: openhub
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_mysql
          coverage: xdebug

      - name: Create .env for CI
        run: |
          printf 'APP_ENV=test\n' > .env
          printf 'APP_SECRET=ci_secret_for_tests\n' >> .env
          printf 'DATABASE_URL=mysql://root:root@127.0.0.1:3306/openhub?serverVersion=8.0.32&charset=utf8mb4\n' >> .env
          printf 'JWT_PASSPHRASE=ci_jwt_passphrase\n' >> .env
          printf 'JWT_PRIVATE_KEY=%%kernel.project_dir%%/config/jwt/private.pem\n' >> .env
          printf 'JWT_PUBLIC_KEY=%%kernel.project_dir%%/config/jwt/public.pem\n' >> .env
          printf 'CORS_ALLOW_ORIGIN=http://localhost:5173\n' >> .env
          printf 'STRIPE_PRIVATE_KEY=sk_test_mock\n' >> .env
          printf 'STRIPE_PUBLIC_KEY=pk_test_mock\n' >> .env
          printf 'STRIPE_SECRET_KEY=sk_test_mock\n' >> .env
          printf 'PAPERTRAIL_TOKEN=https://mock\n' >> .env
          printf 'PAPERTRAIL_URL=mock\n' >> .env
          printf 'DATABASE_URL=mysql://root:root@127.0.0.1:3306/openhub?serverVersion=8.0.32&charset=utf8mb4\n' > .env.test.local
          printf 'JWT_PASSPHRASE=ci_jwt_passphrase\n' >> .env.test.local
          cat .env.test.local

      - name: Generate JWT keys
        run: |
          mkdir -p config/jwt
          openssl genrsa -passout pass:ci_jwt_passphrase -out config/jwt/private.pem 2048
          openssl rsa -in config/jwt/private.pem -passin pass:ci_jwt_passphrase -pubout -out config/jwt/public.pem

      - name: Install Composer dependencies
        run: |
          rm -rf vendor/
          composer install --prefer-dist --no-progress --no-interaction

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -u root -proot --silent && break
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

      - name: Create database schema
        run: php bin/console doctrine:schema:create --env=test

      - name: Phpunit
        run: php vendor/bin/phpunit tests --log-junit phpunit-report.xml || true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-report
          path: backend/phpunit-report.xml